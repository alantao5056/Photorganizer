<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: teal to blue-violet -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <!-- Lighter accent gradient -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#grad1)" filter="url(#shadow)"/>

  <!-- Folder tab shape (top-left area, subtle) -->
  <path d="M152 148 h40 l16 -20 h80 l16 20 h56
           a16 16 0 0 1 16 16 v0 h-224 v0 a16 16 0 0 1 16 -16 z"
        fill="rgba(255,255,255,0.25)"/>

  <!-- Folder body -->
  <rect x="136" y="148" width="240" height="180" rx="16" ry="16" fill="rgba(255,255,255,0.2)"/>

  <!-- Camera aperture icon (centered in folder) -->
  <g transform="translate(256, 246)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="64" fill="none" stroke="white" stroke-width="6" opacity="0.95"/>

    <!-- Aperture blades - 6 blade simplified -->
    <g fill="white" opacity="0.9">
      <polygon points="0,-58 20,-28 -20,-28" transform="rotate(0)"/>
      <polygon points="0,-58 20,-28 -20,-28" transform="rotate(60)"/>
      <polygon points="0,-58 20,-28 -20,-28" transform="rotate(120)"/>
      <polygon points="0,-58 20,-28 -20,-28" transform="rotate(180)"/>
      <polygon points="0,-58 20,-28 -20,-28" transform="rotate(240)"/>
      <polygon points="0,-58 20,-28 -20,-28" transform="rotate(300)"/>
    </g>

    <!-- Inner hexagonal aperture hole -->
    <polygon points="0,-24 21,-12 21,12 0,24 -21,12 -21,-12" fill="url(#grad1)" opacity="0.8"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.6"/>
  </g>

  <!-- Three small organizing arrows at bottom-right -->
  <g transform="translate(340, 340)" fill="white" opacity="0.8">
    <!-- Arrow 1 -->
    <path d="M0,0 L20,0 L20,-6 L30,4 L20,14 L20,8 L0,8 Z"/>
    <!-- Arrow 2 -->
    <path d="M0,20 L24,20 L24,14 L34,24 L24,34 L24,28 L0,28 Z"/>
    <!-- Arrow 3 -->
    <path d="M0,40 L16,40 L16,34 L26,44 L16,54 L16,48 L0,48 Z"/>
  </g>
</svg>
