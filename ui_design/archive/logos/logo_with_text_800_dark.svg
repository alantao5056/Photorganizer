<svg xmlns="http://www.w3.org/2000/svg" width="4200" height="800" viewBox="0 0 4200 800">
  <defs>
    <clipPath id="iconclip"><rect x="60" y="80" width="640" height="640" rx="144"/></clipPath>
    <clipPath id="c1"><rect x="148" y="170" width="210" height="175" rx="20"/></clipPath>
    <clipPath id="c2"><rect x="390" y="170" width="210" height="175" rx="20"/></clipPath>
    <clipPath id="c3"><rect x="148" y="372" width="210" height="175" rx="20"/></clipPath>
    <clipPath id="c4"><rect x="390" y="372" width="210" height="175" rx="20"/></clipPath>
  </defs>

  <!-- Icon base -->
