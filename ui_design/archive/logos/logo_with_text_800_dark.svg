    <polygon points="148,322 220,222 295,282 358,242 358,322" fill="rgba(0,120,212,0.18)"/>
    <circle cx="318" cy="200" r="28" fill="rgba(255,195,0,0.30)"/>
  </g>
  <rect x="148" y="170" width="210" height="175" rx="20" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

  <!-- TR tile -->
  <g clip-path="url(#c2)">
    <rect x="390" y="170" width="210" height="175" rx="20" fill="rgba(255,255,255,0.92)"/>
    <polygon points="390,322 455,225 522,278 582,215 600,244 600,322" fill="rgba(0,120,212,0.14)"/>
    <circle cx="412" cy="200" r="22" fill="rgba(255,195,0,0.22)"/>
  </g>
  <rect x="390" y="170" width="210" height="175" rx="20" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

  <!-- BL tile -->
  <g clip-path="url(#c3)">
    <rect x="148" y="372" width="210" height="175" rx="20" fill="rgba(255,255,255,0.62)"/>
    <polygon points="148,524 208,432 272,485 340,444 358,466 358,524" fill="rgba(0,120,212,0.12)"/>
