<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <clipPath id="tile"><rect width="800" height="800" rx="180"/></clipPath>
    <clipPath id="c1"><rect x="110" y="130" width="240" height="200" rx="24"/></clipPath>
    <clipPath id="c2"><rect x="450" y="130" width="240" height="200" rx="24"/></clipPath>
    <clipPath id="c3"><rect x="110" y="370" width="240" height="200" rx="24"/></clipPath>
    <clipPath id="c4"><rect x="450" y="370" width="240" height="200" rx="24"/></clipPath>
  </defs>

  <!-- Blue rounded square base -->
  <g clip-path="url(#tile)">
    <rect width="800" height="800" fill="#0078D4"/>
  </g>

  <!-- Top-left photo tile -->
  <g clip-path="url(#c1)">
    <rect x="110" y="130" width="240" height="200" rx="24" fill="rgba(255,255,255,0.92)"/>
    <polygon points="110,294 195,190 290,270 350,220 350,294" fill="rgba(0,120,212,0.18)"/>
    <circle cx="300" cy="170" r="28" fill="rgba(255,195,0,0.28)"/>
  </g>
  <rect x="110" y="130" width="240" height="200" rx="24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

  <!-- Top-right photo tile -->
  <g clip-path="url(#c2)">
    <rect x="450" y="130" width="240" height="200" rx="24" fill="rgba(255,255,255,0.92)"/>
    <polygon points="450,294 520,200 590,265 660,190 690,230 690,294" fill="rgba(0,120,212,0.14)"/>
    <circle cx="508" cy="165" r="22" fill="rgba(255,195,0,0.22)"/>
  </g>
  <rect x="450" y="130" width="240" height="200" rx="24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

  <!-- Bottom-left photo tile (dimmer) -->
  <g clip-path="url(#c3)">
    <rect x="110" y="370" width="240" height="200" rx="24" fill="rgba(255,255,255,0.62)"/>
    <polygon points="110,534 175,440 240,505 310,455 350,490 350,534" fill="rgba(0,120,212,0.12)"/>
  </g>
  <rect x="110" y="370" width="240" height="200" rx="24" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

  <!-- Bottom-right photo tile (dimmer) -->
  <g clip-path="url(#c4)">
    <rect x="450" y="370" width="240" height="200" rx="24" fill="rgba(255,255,255,0.62)"/>
    <circle cx="618" cy="415" r="28" fill="rgba(255,195,0,0.18)"/>
    <polygon points="450,534 530,450 610,512 690,468 690,534" fill="rgba(0,120,212,0.1)"/>
  </g>
  <rect x="450" y="370" width="240" height="200" rx="24" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

  <!-- Ghost row at bottom -->
  <rect x="110" y="606" width="240" height="58" rx="16" fill="rgba(255,255,255,0.25)"/>
  <rect x="450" y="606" width="240" height="58" rx="16" fill="rgba(255,255,255,0.25)"/>

  <!-- Calendar badge (bottom-right overlap) -->
  <rect x="524" y="500" width="140" height="116" rx="20" fill="white"/>
  <rect x="524" y="500" width="140" height="42" rx="20" fill="#005A9E"/>
  <rect x="524" y="520" width="140" height="22" fill="#005A9E"/>
  <circle cx="559" cy="565" r="8" fill="#0078D4"/>
  <circle cx="594" cy="565" r="8" fill="#0078D4"/>
  <circle cx="629" cy="565" r="8" fill="#0078D4"/>
  <circle cx="559" cy="592" r="8" fill="#B5D4F4"/>
  <circle cx="594" cy="592" r="8" fill="#B5D4F4"/>
  <circle cx="629" cy="592" r="8" fill="#B5D4F4"/>
</svg>
